run_name: qlora-domain-pilot-qwen35-4b
base_model: Qwen/Qwen3.5-4B
output_dir: training/adapters/qlora-domain-pilot-qwen35-4b
adapter_registry_path: training/adapters/registry.json

dataset:
  train_file: training/data/processed/domain_pilot/train.jsonl
  validation_file: training/data/processed/domain_pilot/validation.jsonl
  test_file: training/data/processed/domain_pilot/test.jsonl
  text_field: text
  max_seq_length: 2048

lora:
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj

quantization:
  load_in_4bit: true
  compute_dtype: bfloat16
  quant_type: nf4
  double_quant: true

optimization:
  num_train_epochs: 1.0
  max_steps: -1
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 1
  gradient_accumulation_steps: 8
  learning_rate: 0.0002
  warmup_ratio: 0.03
  weight_decay: 0.0
  logging_steps: 10
  save_steps: 100
  eval_steps: 100
  eval_strategy: steps
  save_total_limit: 2

runtime:
  seed: 42
  device_map: auto
  trust_remote_code: true
  gradient_checkpointing: true
  report_to:
    - none

metadata:
  domain: project_domain
  task: sft
  source_dataset: thesis_domain_pilot
  intended_use: ablation
  notes: Fine-tuned Qwen 3.5 4B ablation for project/domain-specific QA.
