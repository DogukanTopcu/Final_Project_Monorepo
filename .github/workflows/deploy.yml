name: Deploy

on:
  push:
    branches: [main]

env:
  GCP_REGION: europe-west4
  GCP_PROJECT_ID: thesis-gcp

jobs:
  test:
    uses: ./.github/workflows/ci.yml

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_GITHUB_ACTIONS_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build and push thesis-api
        run: |
          IMAGE=${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/thesis-api/thesis-api
          docker build -f docker/Dockerfile.api -t $IMAGE:$GITHUB_SHA .
          docker tag $IMAGE:$GITHUB_SHA $IMAGE:latest
          docker push $IMAGE:$GITHUB_SHA
          docker push $IMAGE:latest

      - name: Build and push thesis-runner
        run: |
          IMAGE=${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/thesis-runner/thesis-runner
          docker build -f docker/Dockerfile.runner -t $IMAGE:$GITHUB_SHA .
          docker tag $IMAGE:$GITHUB_SHA $IMAGE:latest
          docker push $IMAGE:$GITHUB_SHA
          docker push $IMAGE:latest

  terraform-apply:
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_GITHUB_ACTIONS_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - uses: hashicorp/setup-terraform@v3

      - name: Terraform Apply
        run: |
          cd infrastructure/terraform/environments/dev
          terraform init
          terraform plan -out=tfplan
          terraform apply tfplan
