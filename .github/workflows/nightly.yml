name: Nightly Benchmark

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

env:
  GCP_REGION: europe-west4
  GCP_PROJECT_ID: thesis-gcp

jobs:
  benchmark:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_GITHUB_ACTIONS_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Install dependencies
        run: pip install -e ".[runner]"

      - name: Run nightly benchmarks
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
        run: |
          DATE=$(date +%Y%m%d)
          python -m experiments.run_experiment \
            --architecture all \
            --benchmark mmlu \
            --n_samples 200 \
            --slm qwen3.5-4b \
            --llm llama3.3-70b \
            --output results/nightly/${DATE}/

      - name: Upload results summary
        run: |
          DATE=$(date +%Y%m%d)
          BUCKET=thesis-results-dev-${{ env.GCP_PROJECT_ID }}
          gcloud storage cp --recursive results/ gs://$BUCKET/nightly/${DATE}/ || true

      - name: Notify Slack
        if: always()
        run: |
          STATUS="${{ job.status }}"
          DATE=$(date +%Y%m%d)
          curl -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "{\"text\": \"Nightly benchmark ${DATE}: ${STATUS}\"}" || true
