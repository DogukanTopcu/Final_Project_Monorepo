# Architecture B — Proponent-Opponent-Arbitrator (Multi-Agent)
# Reference: S43 (Qwen2.5 POA surpasses LLM baselines)
architecture: multi_agent
benchmark: mmlu
n_samples: 100
slm: qwen2.5-1.5b
llm: gpt-4o-mini
arbitrator: slm         # set to "llm" to use LLM as arbitrator
n_debate_rounds: 1
seed: 42
output_dir: results
mlflow_tracking_uri: "http://localhost:5000"
