# Setup C — Hybrid Speculative Decoding
# Drafter: Qwen 3.5 4B (port 8001), Verifier: Llama 3.3 70B (port 8000)
# confidence_threshold set by pilot_study.py (default 0.75)
architecture: speculative
benchmark: mmlu
n_samples: 1000
seed: 42
output_dir: results
mlflow_tracking_uri: "http://localhost:5000"
drafter_url: "http://localhost:8001/v1"
verifier_url: "http://localhost:8000/v1"
drafter_model: "Qwen/Qwen3.5-4B"
verifier_model: "meta-llama/Llama-3.3-70B-Instruct"
confidence_threshold: 0.75
max_tokens: 256
