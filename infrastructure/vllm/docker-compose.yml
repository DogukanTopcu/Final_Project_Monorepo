version: "3.9"

# vLLM multi-model serving stack for NVIDIA L40S 48GB
# Each service exposes an OpenAI-compatible API on its own port.
#
# Memory allocation (4-bit quantization):
#   llama33-70b: ~40 GB  → sole occupant of GPU 0
#   qwen35-4b:   ~4  GB
#   gemma4-e4b:  ~5  GB
#   llama32-3b:  ~3  GB
#
# Run Setup B/C: start all small-model services. Run Setup A alone: start only llama33-70b.

services:

  llama33-70b:
    image: vllm/vllm-openai:v0.4.3
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=0
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN}
    volumes:
      - hf_cache:/root/.cache/huggingface
    ports:
      - "8000:8000"
    command: >
      --model meta-llama/Llama-3.3-70B-Instruct
      --served-model-name meta-llama/Llama-3.3-70B-Instruct
      --quantization awq
      --max-model-len 4096
      --gpu-memory-utilization 0.85
      --port 8000
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/v1/models"]
      interval: 30s
      timeout: 10s
      retries: 5

  qwen35-4b:
    image: vllm/vllm-openai:v0.4.3
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=0
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN}
    volumes:
      - hf_cache:/root/.cache/huggingface
    ports:
      - "8001:8001"
    command: >
      --model Qwen/Qwen3.5-4B
      --served-model-name Qwen/Qwen3.5-4B
      --max-model-len 4096
      --gpu-memory-utilization 0.12
      --port 8001
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    profiles: ["multi-agent", "speculative"]

  gemma4-e4b:
    image: vllm/vllm-openai:v0.4.3
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=0
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN}
    volumes:
      - hf_cache:/root/.cache/huggingface
    ports:
      - "8002:8002"
    command: >
      --model google/gemma-4-E4B-it
      --served-model-name google/gemma-4-E4B-it
      --max-model-len 4096
      --gpu-memory-utilization 0.10
      --port 8002
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    profiles: ["multi-agent"]

  llama32-3b:
    image: vllm/vllm-openai:v0.4.3
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=0
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN}
    volumes:
      - hf_cache:/root/.cache/huggingface
    ports:
      - "8003:8003"
    command: >
      --model meta-llama/Llama-3.2-3B-Instruct
      --served-model-name meta-llama/Llama-3.2-3B-Instruct
      --max-model-len 4096
      --gpu-memory-utilization 0.10
      --port 8003
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    profiles: ["multi-agent"]

volumes:
  hf_cache:
