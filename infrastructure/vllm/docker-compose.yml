services:

  # Models that fit on a single GPU for local or ad-hoc server use.
  # Larger multi-GPU deployments are intentionally not defined here; use the
  # Terraform prod host matrix for those.

  llama33-70b:
    image: vllm/vllm-openai:v0.19.1
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=${LLAMA33_VISIBLE_DEVICES:-all}
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN}
    volumes:
      - hf_cache:/root/.cache/huggingface
    ports:
      - "8000:8000"
    command: >
      --model meta-llama/Llama-3.3-70B-Instruct
      --served-model-name meta-llama/Llama-3.3-70B-Instruct
      --port 8000
      --tensor-parallel-size ${LLAMA33_TP_SIZE:-1}
      --max-model-len 32768
      --gpu-memory-utilization 0.90
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    profiles: ["heavy"]

  qwen35-4b:
    image: vllm/vllm-openai:v0.19.1
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=${QWEN35_4B_VISIBLE_DEVICES:-0}
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN}
    volumes:
      - hf_cache:/root/.cache/huggingface
    ports:
      - "8001:8000"
    command: >
      --model Qwen/Qwen3.5-4B
      --served-model-name Qwen/Qwen3.5-4B
      --port 8000
      --max-model-len 32768
      --gpu-memory-utilization 0.75
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    profiles: ["slm", "multi-agent"]

  gemma4-e4b:
    image: vllm/vllm-openai:v0.19.1
